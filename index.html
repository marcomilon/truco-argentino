<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Truco</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="app">

    <header id="scoreboard">
      <div class="score-block">
        <span class="score-name">vos</span>
        <span class="score-num" id="player-score">0</span>
      </div>
      <div id="mano-label" class="mano-label"></div>
      <div class="score-block score-block--right">
        <span class="score-num" id="bot-score">0</span>
        <span class="score-name">bot</span>
      </div>
    </header>

    <section id="bot-zone">
      <div id="bot-hand" class="hand-row"></div>
    </section>

    <section id="arena">
      <div id="bot-played" class="play-spot"></div>
      <div id="trick-dots"></div>
      <div id="player-played" class="play-spot"></div>
    </section>

    <section id="player-zone">
      <div id="player-hand" class="hand-row"></div>
    </section>

    <footer id="controls">
      <div id="action-row">
        <button id="btn-deal"     class="btn btn--primary">Repartir</button>
        <button id="btn-envido"   class="btn hidden">Envido</button>
        <button id="btn-truco"    class="btn hidden">Truco</button>
        <button id="btn-fold"     class="btn btn--ghost hidden">Me voy</button>
        <button id="btn-quiero"   class="btn btn--yes hidden">Quiero</button>
        <button id="btn-noquiero" class="btn btn--no hidden">No quiero</button>
      </div>
      <p id="message"></p>
    </footer>

  </div>

  <script type="module" src="src/game-ui.js"></script>
</body>
</html>
